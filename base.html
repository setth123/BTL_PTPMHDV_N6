<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard tong</title>
    


<!-- ĐÂY LÀ FILE TỔNG CHẠY  -->
<!-- mai thay mấy cái bảng thành link để nhấn vào hiện chi tiết  -->
<!-- Cái thanh tìm kiếm có thể xóa nó đi tại t cho cái lọc r, m có thể thêm function cho nó cx đc -->



    <!-- Thư viện Font Awesome cho icon -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-image: url('image.png'); /* Set your uploaded image as background */
            background-size: cover; /* Make sure it covers the whole background */
            background-position: center; /* Center the image */
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background-color: rgba(59, 12, 161, 0.8); /* Sidebar color with transparency */
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 15px;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        /* Sidebar hover effect */
        .sidebar:hover {
            transform: translateX(0); /* Remove gap */
        }

        .sidebar h2 {
            margin: 0;
            margin-bottom: 20px;
            
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            display: flex;
            align-items: center;
            padding: 10px 0;
            gap: 10px;
            cursor: pointer;
            transition: color 0.3s ease, transform 0.3s ease;
            padding-left: 10px; /* Add some padding */
        }

        .sidebar a:hover {
            color: #ffdd57;
            transform: translateX(5px) scale(1.05); /* Slightly enlarge */
        }

        /* Search bar */
        .search-bar {
            width: 60%;
            max-width: 400px;
            margin: 20px auto;
            display: flex;
            justify-content: center;
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            transition: width 0.4s ease, box-shadow 0.3s ease;
            z-index: 10; /* Add z-index to ensure it's above other elements */
        }

        .search-bar input {
            width: 100%;
            padding: 10px 20px;
            border-radius: 25px;
            border: 1px solid #ddd;
            font-size: 16px;
            outline: none;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }

        /* Khi nhấp vào thanh tìm kiếm */
        .search-bar input:focus {
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transform: scale(1.05); /* Phóng to nhẹ */
        }

        /* Main content container */
        .main-content-container {
            flex: 1;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            margin-top: 70px; /* Add margin to separate from the search bar */
        }

        /* Main content */
        .main-content {
            width: 100%;  /* Full width */
            height: calc(100vh - 70px); /* Full height minus the search bar */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Iframe content */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        /* Iframe loaded animation */
        iframe.loaded {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Dashboard</h2>
        <a onclick="changeDashboardColor('#ffffff'); loadContent('content.html');">
            <i class="fas fa-car">
                <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

            </i> Dashboard <!-- Car icon added here -->
        </a>
        <a onclick="changeDashboardColor('#ffffff'); loadContent('interest.html');">
            <i class="fas fa-percent"></i> Lãi suất ngân hàng
        </a>
        <a onclick="signOut();">
            <i class="fas fa-sign-out-alt"></i> Sign Out
        </a>
    </div>

    <!-- Search bar -->
    <div class="search-bar">
        <input type="text" placeholder="Tìm kiếm...">
    </div>

    <!-- Main content container -->
    <div class="main-content-container">
        <!-- Main content chứa iframe -->
        <div class="main-content">
            <iframe id="contentFrame" src="content.html" onload="applyAnimation()"></iframe>
        </div>
    </div>

    <script>
        // Thay đổi nội dung iframe khi nhấp vào menu
        function loadContent(page) {
            const iframe = document.getElementById('contentFrame');
            iframe.classList.remove('loaded'); // Kích hoạt hiệu ứng
            iframe.src = page;
        }

        // Áp dụng hiệu ứng khi iframe được tải
        function applyAnimation() {
            const iframe = document.getElementById('contentFrame');
            iframe.classList.add('loaded'); // Hiệu ứng xuất hiện
        }

        // Thay đổi màu nền của dashboard
        function changeDashboardColor(color) {
            document.body.style.backgroundColor = color;
        }

        // Đăng xuất
        function signOut() {
            alert('Bạn đã đăng xuất!');
        }
    </script>

</body>
</html>
